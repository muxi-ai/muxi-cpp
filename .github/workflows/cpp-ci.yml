name: C++ SDK CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev libssl-dev nlohmann-json3-dev

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DBUILD_TESTS=ON
          make -j$(nproc)

      - name: Unit tests
        run: cd build && ctest --output-on-failure
